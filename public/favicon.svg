<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8a7bc2"/>
      <stop offset="50%"  stop-color="#b29fc8"/>
      <stop offset="100%" stop-color="#d4a578"/>
    </linearGradient>
    <linearGradient id="sun-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background (sky gradient) -->
  <rect width="512" height="512" rx="96" fill="url(#sky)"/>

  <!-- Sun (partially behind cloud) -->
  <circle cx="346" cy="188" r="74" fill="url(#sun-g)"/>

  <!-- Cloud (layered ellipses for depth) -->
  <ellipse cx="196" cy="308" rx="92"  ry="58" fill="white" opacity="0.93"/>
  <ellipse cx="148" cy="286" rx="66"  ry="66" fill="white" opacity="0.93"/>
  <ellipse cx="268" cy="275" rx="80"  ry="80" fill="white" opacity="0.93"/>
  <ellipse cx="345" cy="305" rx="70"  ry="54" fill="white" opacity="0.93"/>

  <!-- Rain drops -->
  <rect x="157" y="378" width="9" height="24" rx="4.5" fill="white" opacity="0.65"/>
  <rect x="200" y="390" width="9" height="24" rx="4.5" fill="white" opacity="0.65"/>
  <rect x="243" y="376" width="9" height="24" rx="4.5" fill="white" opacity="0.65"/>
  <rect x="286" y="388" width="9" height="24" rx="4.5" fill="white" opacity="0.65"/>
  <rect x="329" y="378" width="9" height="24" rx="4.5" fill="white" opacity="0.65"/>
</svg>
