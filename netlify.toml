[build]
  command = "bun run build"
  publish = "dist"

[build.environment]
  BUN_VERSION  = "1"
  NODE_VERSION = "20"

[[redirects]]
  from   = "/*"
  to     = "/200.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"